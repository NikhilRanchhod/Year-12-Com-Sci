<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Time Tracking Dashboard</title>
</head>

<body>
  <main class="dashboard">      

    <div class="profile-card">
      <div class="profile-info">
        <img src="./images/image-jeremy.png" alt="Jeremy Robson" class="avatar">
        <p class="report-label">Report for</p>
        <h1 class="profile-name">Jeremy Robson</h1>
      </div>
      <nav class="time-periods">
        <button class="period active">Daily</button>
        <button class="period">Weekly</button>
        <button class="period">Monthly</button>
      </nav>
    </div>

    <div class="track-card" id="work">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="card-header">
          <h2 class="card-title">Work</h2>
          <button class="card-menu">···</button>
        </div>
        <p class="card-hours">32hrs</p>
        <p class="card-previous">Last Week — 36hrs</p>
      </div>
    </div>

    <div class="track-card" id="play">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="card-header">
          <h2 class="card-title">Play</h2>
          <button class="card-menu">···</button>
        </div>
        <p class="card-hours">10hrs</p>
        <p class="card-previous">Last Week — 8hrs</p>
      </div>
    </div>

    <div class="track-card" id="study">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="card-header">
          <h2 class="card-title">Study</h2>
          <button class="card-menu">···</button>
        </div>
        <p class="card-hours">4hrs</p>
        <p class="card-previous">Last Week — 7hrs</p>
      </div>
    </div>

    <div class="track-card" id="exercise">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="card-header">
          <h2 class="card-title">Exercise</h2>
          <button class="card-menu">···</button>
        </div>
        <p class="card-hours">4hrs</p>
        <p class="card-previous">Last Week — 5hrs</p>
      </div>
    </div>

    <div class="track-card" id="social">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="card-header">
          <h2 class="card-title">Social</h2>
          <button class="card-menu">···</button>
        </div>
        <p class="card-hours">5hrs</p>
        <p class="card-previous">Last Week — 10hrs</p>
      </div>
    </div>

    <div class="track-card" id="selfcare">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="card-header">
          <h2 class="card-title">Self Care</h2>
          <button class="card-menu">···</button>
        </div>
        <p class="card-hours">2hrs</p>
        <p class="card-previous">Last Week — 2hrs</p>
      </div>
    </div>

  </main>
</body>

</html>
